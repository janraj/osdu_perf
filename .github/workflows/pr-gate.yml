name: PR Gate

on:
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  build-and-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pytest
          pip install -e .

      - name: Build package
        run: python -m build

      - name: Run unit tests
        run: pytest tests/unit -q
