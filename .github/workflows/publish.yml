name: Publish to PyPI

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-build-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine pytest pytest-cov
          pip install -e .

      - name: Decide bump type from commit message
        id: bump_type
        shell: bash
        run: |
          MESSAGE="${{ github.event.head_commit.message }}"
          BUMP_TYPE="patch"

          if echo "$MESSAGE" | grep -Eiq 'major[[:space:]]+version[[:space:]]+update|major[[:space:]]+update|breaking[[:space:]]+change|\[major\]|#major'; then
            BUMP_TYPE="major"
          elif echo "$MESSAGE" | grep -Eiq 'minor[[:space:]]+version[[:space:]]+update|minor[[:space:]]+update|\[minor\]|#minor'; then
            BUMP_TYPE="minor"
          fi

          echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"

      - name: Bump version files
        id: bump
        shell: bash
        run: |
          OUTPUT=$(python scripts/bump_version.py --bump "${{ steps.bump_type.outputs.bump_type }}")
          echo "$OUTPUT"

          NEW_VERSION=$(echo "$OUTPUT" | awk -F= '/^NEW_VERSION=/{print $2}')
          CURRENT_VERSION=$(echo "$OUTPUT" | awk -F= '/^CURRENT_VERSION=/{print $2}')

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push bumped version
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml setup.py osdu_perf/__init__.py
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

      - name: Build package
        run: python -m build

      - name: Run unit tests
        run: pytest tests/unit -q

      - name: Verify package metadata
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
